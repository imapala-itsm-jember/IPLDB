<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMAPALA Database</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #121212; 
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    
    <!-- Ikon khusus untuk layar iPhone & iPad -->
    <link rel="apple-touch-icon" sizes="180x180" href="logo.png">
    
    <!-- Membuat tampilan aplikasi fullscreen tanpa bar browser Safari -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

    <iframe src="https://script.google.com/macros/s/AKfycbzscsFcPQtzRIhcOX7P4f4V5duR8AgW3zPmbFuuTHwdP5tmeb6sWqsek1snyP_QrExI/exec" allowtransparency="true"></iframe>

    <!-- SKRIP TAMBAHAN: Mendaftarkan Service Worker agar Tombol Instal Muncul -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(reg => console.log('Service Worker Berhasil Terdaftar!'))
                    .catch(err => console.error('Service Worker Gagal:', err));
            });
        }
    </script>

</body>
</html>
